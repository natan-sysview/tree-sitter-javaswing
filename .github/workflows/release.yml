name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: GitHub prerelease
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release candidate
        run: npm run ci:check

      - name: Resolve release notes
        id: notes
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          notes="docs/releases/${version}.md"
          if [[ ! -f "$notes" && "$version" == *"-"* ]]; then
            notes="docs/releases/${version//-/.}.md"
          fi
          if [[ ! -f "$notes" && "$version" == "0.1.0-alpha" ]]; then
            notes="docs/releases/0.1.0-alpha.md"
          fi
          if [[ ! -f "$notes" ]]; then
            echo "Release notes file not found for $tag" >&2
            exit 1
          fi
          echo "file=$notes" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 && \
            gh release edit "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file "${{ steps.notes.outputs.file }}" \
              --prerelease || \
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file "${{ steps.notes.outputs.file }}" \
              --prerelease
