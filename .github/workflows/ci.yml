name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tree-sitter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Generate parser
        run: npm run generate

      - name: Check generated artifacts
        run: git diff --exit-code -- grammar.js tree-sitter.json src/parser.c src/grammar.json src/node-types.json

      - name: Check public metadata
        run: npm run metadata:check:public

      - name: Run corpus tests
        run: npm test

      - name: Run parse smoke test
        run: npm run parse:check

      - name: Check queries
        run: npm run query:check

      - name: Check public package contents
        run: npm run pack:check

      - name: Audit npm dependencies
        run: npm run audit:check
